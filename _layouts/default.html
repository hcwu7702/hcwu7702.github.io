<!DOCTYPE html>
<!--
  Layout: default.html
  Main site wrapper: header/navigation, content area, footer.
  Nav links use relative filenames so they work on GitHub Pages and local previews.
  The `active` class is applied to the current page's nav link.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} &middot; {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.title }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">

  <!-- Social share previews (Open Graph + Twitter) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{{ page.title }} &middot; {{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/img/profile.jpg' | absolute_url }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title }} &middot; {{ site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image" content="{{ '/assets/img/profile.jpg' | absolute_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav class="container" aria-label="Main navigation">
      <p class="site-title"><a href="index.html">Hung-Chieh Wu</a></p>
      <ul>
        <li><a href="index.html" {% if page.url == '/' or page.url contains 'index' %}class="active"{% endif %}>Home</a></li>
        <li><a href="about.html" {% if page.url contains 'about' %}class="active"{% endif %}>About</a></li>
        <li><a href="publications.html" {% if page.url contains 'publications' %}class="active"{% endif %}>Publications</a></li>
        <li><a href="skills.html" {% if page.url contains 'skills' %}class="active"{% endif %}>Skills</a></li>
        <li><a href="projects.html" {% if page.url contains 'projects' or page.url contains 'stratmamba' %}class="active"{% endif %}>Projects</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} Hung-Chieh Wu &middot;
         hungchieh [at] psu.edu &middot;
         <a href="https://github.com/{{ site.github_username }}">GitHub</a></p>
    </div>
  </footer>

  <script src="{{ '/assets/js/lightbox.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/carousel.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/external-links.js' | relative_url }}" defer></script>
</body>
</html>
